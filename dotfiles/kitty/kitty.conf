# --- Polices ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 12.0

# --- Fenêtre ---
# Opacité de l'arrière-plan (de 0.0 à 1.0)
background_opacity 0.33

# Marges intérieures pour que le texte ne colle pas aux bords
window_padding_width 1

# Cacher la barre de titre de la fenêtre (très propre sous Hyprland)
hide_window_decorations yes

# BEGIN_KITTY_THEME
include current-theme.conf
# END_KITTY_THEME
